<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta Watcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-1:#0b1720;--bg-2:#102736;--bg-3:#113548;
  --glass:rgba(12,24,34,.62);--soft:rgba(16,34,49,.84);
  --border:rgba(148,180,202,.18);
  --text:#e8f1f7;--muted:#89a7ba;--body:#c7d8e4;
  --teal:#2dd4bf;--amber:#fbbf24;--imdb:#f5c518;
  --r-xl:24px;--r-lg:18px;--r-md:12px;
  --shadow:0 10px 30px rgba(1,8,13,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:"Manrope","Segoe UI",sans-serif;color:var(--body);background:
  radial-gradient(circle at 15% 12%,rgba(45,212,191,.2) 0%,transparent 40%),
  radial-gradient(circle at 88% 8%,rgba(251,191,36,.15) 0%,transparent 35%),
  linear-gradient(145deg,var(--bg-1) 0%,var(--bg-2) 48%,var(--bg-3) 100%);}
h1,h2,h3,.stat-val{font-family:"Sora","Manrope",sans-serif;color:var(--text);letter-spacing:-.02em}

.orb{position:fixed;border-radius:999px;filter:blur(4px);pointer-events:none;z-index:-1}
.orb-1{width:360px;height:360px;top:-120px;left:-40px;background:rgba(45,212,191,.13)}
.orb-2{width:280px;height:280px;bottom:-80px;right:-60px;background:rgba(251,191,36,.10)}

header{padding:20px 16px 0;max-width:900px;margin:0 auto}
.header-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo{font-size:22px;font-family:"Sora",sans-serif;font-weight:700;color:var(--text)}
.logo span{color:var(--teal)}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:16px}

.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-md);
  padding:10px 16px;display:flex;flex-direction:column;gap:2px;flex:1;min-width:70px}
.stat-val{font-size:20px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

.controls{max-width:900px;margin:0 auto;padding:0 16px 16px}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:12px 16px 12px 42px;color:var(--text);
  font-family:"Manrope",sans-serif;font-size:14px;outline:none}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:var(--teal)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}

.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-md);
  padding:7px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;
  transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text);border-color:rgba(148,180,202,.4)}
.tab.active{background:rgba(45,212,191,.15);border-color:var(--teal);color:var(--teal)}

.grid{max-width:900px;margin:0 auto;padding:0 16px 40px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:18px;display:flex;flex-direction:column;gap:10px;
  box-shadow:var(--shadow);transition:border-color .2s,transform .15s}
.card:hover{border-color:rgba(45,212,191,.4);transform:translateY(-2px)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.cat-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;
  white-space:nowrap;flex-shrink:0}
.cat-Movie{background:rgba(45,212,191,.15);color:var(--teal);border:1px solid rgba(45,212,191,.3)}
.cat-Anime{background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.3)}
.cat-Series{background:rgba(147,51,234,.2);color:#c084fc;border:1px solid rgba(147,51,234,.3)}

.card-title{font-family:"Sora",sans-serif;font-size:16px;font-weight:700;color:var(--text);
  line-height:1.3;flex:1}
.card-meta{font-size:12px;color:var(--muted)}

.scores{display:flex;gap:10px;flex-wrap:wrap}
.score{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600}
.score-imdb{color:var(--imdb)}
.score-rt{color:#fa7b17}
.score-dot{width:6px;height:6px;border-radius:50%}
.dot-imdb{background:var(--imdb)}
.dot-rt{background:#fa7b17}

.plot{font-size:12px;color:var(--muted);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.card-footer{display:flex;gap:8px;margin-top:4px}
.btn-reel{flex:1;background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.25);
  border-radius:var(--r-md);padding:8px;text-align:center;font-size:12px;font-weight:600;
  color:var(--teal);text-decoration:none;transition:background .2s}
.btn-reel:hover{background:rgba(45,212,191,.22)}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:16px}

@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .stat-val{font-size:18px}
}
</style>
</head>

<div class="orb orb-1"></div>

</header>

<div class="controls">

</div>

let activeCat = 'all', query = '';

function render() {
  const grid = document.getElementById('grid');
  const q = query.toLowerCase();
  const filtered = DATA.filter(c => {
    const catOk = activeCat === 'all' || c.category === activeCat;
    const txtOk = !q || c.title.toLowerCase().includes(q)
      || (c.genre||'').toLowerCase().includes(q)
      || (c.plot||'').toLowerCase().includes(q);
    return catOk && txtOk;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No results found</div></div>';
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const imdb = c.imdb && c.imdb !== 'N/A'
      ? `<div class="score score-imdb"><span class="score-dot dot-imdb"></span>⭐ ${c.imdb}</div>` : '';
    const rt = c.rt && c.rt !== 'N/A'
      ? `<div class="score score-rt"><span class="score-dot dot-rt"></span>🍅 ${c.rt}</div>` : '';
    const meta = [c.genre, c.year].filter(Boolean).join(' · ');
    const plot = c.plot ? `<div class="plot">${c.plot}</div>` : '';
    const reelBtn = c.url
      ? `<a class="btn-reel" href="${c.url}" target="_blank" rel="noopener">▶ View Reel</a>` : '';
    return `
    <div class="card">
      <div class="card-top">
        <div class="card-title">${c.title}</div>
        <span class="cat-badge cat-${c.category}">${c.category}</span>
      </div>
      ${meta ? `<div class="card-meta">${meta}</div>` : ''}
      ${(imdb||rt) ? `<div class="scores">${imdb}${rt}</div>` : ''}
      ${plot}
      ${reelBtn ? `<div class="card-footer">${reelBtn}</div>` : ''}
    </div>`;
  }).join('');
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeCat = t.dataset.cat;
    render();
  });
});

document.getElementById('searchBox').addEventListener('input', e => {
  query = e.target.value;
  render();
});

render();
</script>
